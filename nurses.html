<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPCF Medical Center | Nursing Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .grid-pattern { background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
        .card-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.5); }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="text-slate-200 min-h-screen selection:bg-blue-500/30 grid-pattern">

    <header class="sticky top-0 z-40 w-full glass border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="group flex items-center gap-2 p-2 rounded-xl hover:bg-white/5 transition-all" title="Back to Index">
                    <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center group-hover:bg-blue-600 transition-colors">
                        <svg class="w-5 h-5 text-slate-300 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </div>
                    <span class="text-sm font-semibold tracking-widest uppercase text-slate-400 group-hover:text-white transition-colors">Return</span>
                </a>
                <div class="h-6 w-px bg-white/10 mx-2"></div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-600/20 border border-blue-500/50 flex items-center justify-center font-bold text-blue-400 text-xs shadow-[0_0_10px_rgba(37,99,235,0.3)]">SPCF</div>
                    <h1 class="text-sm font-bold tracking-tight text-white uppercase tracking-widest"> <span class="text-blue-500">   CONsulTayo  Inc.</span></h1>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-3 px-4 py-2 bg-slate-950 rounded-full border border-white/5">
                <div class="relative w-2 h-2">
                    <div class="absolute inset-0 bg-emerald-500 rounded-full animate-ping"></div>
                    <div class="absolute inset-0 bg-emerald-500 rounded-full"></div>
                </div>
                <span class="text-xs font-mono font-bold text-emerald-500 uppercase">Registry Verified</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
            <div>
                <h2 class="text-4xl font-extrabold text-white tracking-tight mb-2">Nursing Registry</h2>
                <p class="text-slate-400">Official directory of active registered nursing personnel.</p>
            </div>
            <div class="bg-slate-900/50 backdrop-blur border border-white/5 p-5 rounded-3xl">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Total Active</p>
                <p class="text-3xl font-mono text-white">09</p>
            </div>
        </div>

        <div id="nurse-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Nurse cards injected via script -->
        </div>
    </main>

    <script>
        const nurses = [
            "Artezuela, Shanly",
            "Cayanan, Shaianne Jade",
            "Dizon, Francois Niko",
            "Garcia, Genesis",
            "Legaspi, Adrian",
            "Ocampo, Chlouie",
            "Salta, Mariella Dimple",
            "Sta Teresa, Aeira Lei",
            "Udeh, Ifunanya Esther"
        ];

        function renderNurses() {
            const grid = document.getElementById('nurse-grid');
            grid.innerHTML = nurses.map((name, index) => `
                <div class="group bg-slate-900 border border-white/5 p-6 rounded-3xl transition-all duration-500 hover:scale-[1.02] card-glow flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">
                        ${name.split(',')[1][1]}
                    </div>
                    <div>
                        <h3 class="font-bold text-white group-hover:text-blue-400 transition-colors">${name}</h3>
                        <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">RN-ID: 2026-${(index + 1).toString().padStart(3, '0')}</p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = renderNurses;
    </script>
</body>
</html>
